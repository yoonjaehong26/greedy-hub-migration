<!doctype html>
<html lang="ko" class="scroll-smooth">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>지원 — 그리디 허브</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/site.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 font-sans antialiased">
  <div id="nav"></div>

  <main class="mx-auto max-w-3xl px-5 py-10">
    <div class="flex items-center gap-3"><h1 class="text-2xl md:text-3xl font-bold">4기 지원</h1><span id="rolebadge"></span></div>
    <p class="mt-1 text-slate-600 dark:text-slate-400">재학생·휴학생 누구나. 에타 공고를 보고 오셨다면 여기서 바로 지원하세요.</p>

    <!-- 전형 안내 -->
    <div class="mt-6 rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-5">
      <div class="text-sm font-semibold text-slate-500 mb-3">전형 안내</div>
      <ol class="space-y-3 text-sm">
        <li class="flex gap-3"><span class="w-6 h-6 shrink-0 rounded-full bg-brand text-white grid place-items-center font-bold text-xs">1</span><div><b>지원서 제출</b> — 아래 폼을 작성해 주세요.</div></li>
        <li class="flex gap-3"><span class="w-6 h-6 shrink-0 rounded-full bg-brand text-white grid place-items-center font-bold text-xs">2</span><div><b>서류 심사</b> — 합격하시면 <b class="text-brand">입력하신 연락처로 개별 안내</b>드립니다.</div></li>
        <li class="flex gap-3"><span class="w-6 h-6 shrink-0 rounded-full bg-brand text-white grid place-items-center font-bold text-xs">3</span><div><b>면접 · 최종 결과</b> — 면접 일정과 최종 합격 여부도 개별적으로 연락드려요.</div></li>
      </ol>
    </div>

    <!-- 폼 -->
    <form class="mt-8 rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-6 space-y-5" onsubmit="return false">
      <div>
        <label class="block text-sm font-medium mb-1.5">이름</label>
        <input class="w-full rounded-lg px-3 py-2 bg-slate-50 dark:bg-slate-900 ring-1 ring-slate-900/10 dark:ring-white/10" placeholder="홍길동" />
      </div>
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1.5">학번 / 학과</label>
          <input class="w-full rounded-lg px-3 py-2 bg-slate-50 dark:bg-slate-900 ring-1 ring-slate-900/10 dark:ring-white/10" placeholder="컴퓨터공학과" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">희망 트랙</label>
          <select class="w-full rounded-lg px-3 py-2 bg-slate-50 dark:bg-slate-900 ring-1 ring-slate-900/10 dark:ring-white/10"><option>프론트엔드 (FE)</option><option>백엔드 (BE)</option></select>
        </div>
      </div>
      <div class="grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1.5">이메일 <span class="text-slate-400">(결과 안내용)</span></label>
          <input type="email" class="w-full rounded-lg px-3 py-2 bg-slate-50 dark:bg-slate-900 ring-1 ring-slate-900/10 dark:ring-white/10" placeholder="you@example.com" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">디스코드 ID <span class="text-slate-400">(선택)</span></label>
          <input class="w-full rounded-lg px-3 py-2 bg-slate-50 dark:bg-slate-900 ring-1 ring-slate-900/10 dark:ring-white/10" placeholder="username" />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1.5">GitHub (선택)</label>
        <input class="w-full rounded-lg px-3 py-2 bg-slate-50 dark:bg-slate-900 ring-1 ring-slate-900/10 dark:ring-white/10" placeholder="github.com/..." />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1.5">지원 동기</label>
        <textarea rows="4" class="w-full rounded-lg px-3 py-2 bg-slate-50 dark:bg-slate-900 ring-1 ring-slate-900/10 dark:ring-white/10" placeholder="개발을 꾸준히 하고 싶은 이유를 적어주세요"></textarea>
      </div>
      <label class="flex items-start gap-2 text-sm text-slate-500"><input type="checkbox" class="mt-1"/> 제출한 정보가 심사 목적으로 저장되는 것에 동의합니다.</label>
      <button class="w-full py-3 rounded-xl bg-brand text-white font-semibold hover:bg-brand-soft" title="제출하면 운영진이 검토하고, 서류 합격 시 개별적으로 연락드립니다">지원서 제출</button>
    </form>

    <p class="mt-4 text-center text-sm text-slate-400">결과는 입력하신 연락처로 <b>개별 안내</b>드립니다. (사이트 실시간 상태 조회는 제공하지 않아요)</p>
  </main>

  <div id="footer"></div>
  <script>renderChrome('recruit.html'); document.getElementById('rolebadge').innerHTML = roleBadge('공개');</script>
</body>
</html>
