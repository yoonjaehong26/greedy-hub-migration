<!doctype html>
<html lang="ko" class="scroll-smooth">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>활동 타임라인 — 그리디 허브</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/site.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 font-sans antialiased">
  <div id="nav"></div>

  <main class="mx-auto max-w-4xl px-5 py-10">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div>
        <div class="flex items-center gap-3"><h1 class="text-2xl md:text-3xl font-bold">활동 타임라인</h1><span id="rolebadge"></span></div>
        <p class="mt-1 text-slate-600 dark:text-slate-400">그리디가 함께한 순간들 — 사진과 한 줄로 남기는 기록.</p>
      </div>
      <button data-roles="member,reviewer,staff,alumni" class="px-4 py-2 rounded-lg bg-brand text-white font-semibold text-sm" title="활동 사진과 소개를 추가합니다 (멤버)">+ 활동 올리기</button>
    </div>

    <!-- 필터 -->
    <div class="mt-6 flex flex-wrap gap-2 text-sm" id="filters">
      <button data-f="all" class="filt px-3 py-1.5 rounded-full bg-brand text-white">전체</button>
      <button data-f="행사" class="filt px-3 py-1.5 rounded-full bg-white dark:bg-slate-800 ring-1 ring-slate-900/10 dark:ring-white/10">행사</button>
      <button data-f="세션" class="filt px-3 py-1.5 rounded-full bg-white dark:bg-slate-800 ring-1 ring-slate-900/10 dark:ring-white/10">세션</button>
      <button data-f="데모데이" class="filt px-3 py-1.5 rounded-full bg-white dark:bg-slate-800 ring-1 ring-slate-900/10 dark:ring-white/10">데모데이</button>
    </div>

    <!-- 타임라인 -->
    <ol id="timeline" class="mt-8 relative border-s-2 border-slate-200 dark:border-white/10 ml-2 space-y-8"></ol>
  </main>

  <div id="footer"></div>
  <script>
    renderChrome('gallery.html');
    document.getElementById('rolebadge').innerHTML = roleBadge('공개');

    const grad = ['from-brand/40','from-emerald-400/40','from-amber-400/40','from-rose-400/40','from-violet-400/40','from-cyan-400/40'];
    const items = [
      {date:'2026.05', tag:'행사', cat:'행사', title:'4기 MT — 1박 2일', desc:'4기가 처음으로 함께한 엠티. 게임하고 밤새 코드 얘기하고.', imgs:3},
      {date:'2026.04', tag:'세션', cat:'세션', title:'React 심화 세션', desc:'상태관리·렌더링 최적화를 대면 스터디로 정리한 날.', imgs:2},
      {date:'2026.03', tag:'행사', cat:'행사', title:'4기 OT & 아이스브레이킹', desc:'새 기수의 시작. 트랙 소개와 커리큘럼 안내.', imgs:2},
      {date:'2025.11', tag:'데모데이', cat:'데모데이', title:'3기 프로젝트 데모데이', desc:'한 학기 팀 프로젝트를 발표하고 피드백을 나눈 자리.', imgs:3},
      {date:'2025.05', tag:'축제', cat:'행사', title:'세종대 축제 부스 운영', desc:'직접 만든 웹 게임으로 부스를 운영했어요.', imgs:3},
      {date:'2024.03', tag:'창립', cat:'행사', title:'그리디 시작', desc:'개발에 진심인 사람들이 모여 그리디를 만들었습니다.', imgs:1},
    ];
    const tagCls = {
      '행사':'bg-brand/10 text-brand', '세션':'bg-emerald-100 text-emerald-700 dark:bg-emerald-400/15 dark:text-emerald-300',
      '데모데이':'bg-amber-100 text-amber-700 dark:bg-amber-400/15 dark:text-amber-300', '축제':'bg-rose-100 text-rose-700 dark:bg-rose-400/15 dark:text-rose-300',
      '창립':'bg-slate-200 text-slate-600 dark:bg-white/10',
    };
    function render(f){
      let gi = 0;
      document.getElementById('timeline').innerHTML = items.filter(it=>f==='all'||it.cat===f).map(it=>{
        const imgs = Array.from({length:it.imgs}).map(()=>`<div class="aspect-[4/3] rounded-lg bg-gradient-to-br ${grad[(gi++)%grad.length]} to-slate-200 dark:to-slate-700" title="활동 사진 (예시)"></div>`).join('');
        return `
        <li class="ms-6">
          <span class="absolute -start-[9px] w-4 h-4 rounded-full bg-brand ring-4 ring-slate-50 dark:ring-slate-900"></span>
          <div class="flex items-center gap-2 mb-2">
            <time class="text-sm font-semibold text-slate-500">${it.date}</time>
            <span class="text-xs px-2 py-0.5 rounded-full ${tagCls[it.tag]||''}">${it.tag}</span>
          </div>
          <a href="#" title="활동 상세·사진 더 보기" class="block rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-4 hover:-translate-y-0.5 transition">
            <h3 class="font-semibold">${it.title}</h3>
            <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">${it.desc}</p>
            <div class="mt-3 grid grid-cols-3 gap-2">${imgs}</div>
          </a>
        </li>`;
      }).join('');
    }
    render('all');
    document.querySelectorAll('.filt').forEach(b=>b.onclick=()=>{
      document.querySelectorAll('.filt').forEach(x=>x.className='filt px-3 py-1.5 rounded-full bg-white dark:bg-slate-800 ring-1 ring-slate-900/10 dark:ring-white/10');
      b.className='filt px-3 py-1.5 rounded-full bg-brand text-white';
      render(b.dataset.f);
    });
  </script>
</body>
</html>
