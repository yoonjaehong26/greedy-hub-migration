<!doctype html>
<html lang="ko" class="scroll-smooth">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>지원자 관리 — 그리디 허브</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/site.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 font-sans antialiased">
  <div id="nav"></div>

  <main class="mx-auto max-w-6xl px-5 py-10">
    <div class="flex items-center gap-3">
      <a href="admin.html" class="text-sm text-slate-500 hover:text-brand">← 운영진</a>
      <span id="rolebadge"></span>
    </div>
    <h1 class="mt-3 text-2xl md:text-3xl font-bold">지원자 관리</h1>
    <p class="mt-1 text-slate-600 dark:text-slate-400">들어온 지원서를 한눈에. 결과는 지원자에게 <b>개별 연락</b>으로 안내합니다.</p>

    <!-- 요약 -->
    <div class="mt-6 grid grid-cols-2 sm:grid-cols-4 gap-4">
      <div class="rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-4"><div class="text-sm text-slate-500">총 지원</div><div class="mt-1 text-2xl font-bold">5</div></div>
      <div class="rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-4"><div class="text-sm text-slate-500">서류 심사</div><div class="mt-1 text-2xl font-bold text-brand">3</div></div>
      <div class="rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-4"><div class="text-sm text-slate-500">면접</div><div class="mt-1 text-2xl font-bold text-amber-500">1</div></div>
      <div class="rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-4"><div class="text-sm text-slate-500">합격</div><div class="mt-1 text-2xl font-bold text-emerald-600">1</div></div>
    </div>

    <div class="mt-6 grid lg:grid-cols-[320px_1fr] gap-6">
      <!-- 지원자 목록 -->
      <aside class="rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 divide-y divide-slate-100 dark:divide-white/10 h-max">
        <div class="p-4 text-sm font-semibold text-slate-500">지원자 · <span id="cnt"></span>명</div>
        <div id="list"></div>
      </aside>

      <!-- 선택 상세 -->
      <section id="detail" class="rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-6"></section>
    </div>
    <p class="mt-3 text-xs text-slate-400">지원자에겐 사이트 상태가 노출되지 않습니다. 단계 변경은 운영진 내부 기록이며, 통보는 이메일/디스코드로 직접.</p>
  </main>

  <div id="footer"></div>
  <script>
    renderChrome('admin.html');
    document.getElementById('rolebadge').innerHTML = roleBadge('운영진');

    const stageCls={ '서류':'bg-brand/10 text-brand','면접':'bg-amber-100 text-amber-700 dark:bg-amber-400/15 dark:text-amber-300','합격':'bg-emerald-100 text-emerald-700 dark:bg-emerald-400/15 dark:text-emerald-300','불합격':'bg-slate-200 text-slate-500 dark:bg-white/10' };
    const apps=[
      {name:'강서윤',track:'FE',no:'컴퓨터공학과 21',email:'seoyun@sju.ac.kr',discord:'seoyun_k',gh:'github.com/seoyun',stage:'서류',date:'2026.06.08',motive:'리액트를 독학했는데 혼자선 한계를 느껴요. 리뷰 받으며 제대로 된 코드를 쓰고 싶어 지원합니다.'},
      {name:'노지훈',track:'BE',no:'소프트웨어학과 22',email:'jihoon@sju.ac.kr',discord:'jihoon99',gh:'github.com/jihoon',stage:'서류',date:'2026.06.08',motive:'스프링으로 사이드 프로젝트를 했지만 설계가 약합니다. 미션·리뷰로 기본기를 다지고 싶어요.'},
      {name:'명수아',track:'FE',no:'컴퓨터공학과 22',email:'sua@sju.ac.kr',discord:'sua.m',gh:'',stage:'서류',date:'2026.06.09',motive:'동아리 활동으로 꾸준함을 만들고, 팀 프로젝트까지 경험하고 싶습니다.'},
      {name:'한가람',track:'FE',no:'컴퓨터공학과 23',email:'garam@sju.ac.kr',discord:'garam',gh:'github.com/garam',stage:'면접',date:'2026.06.07',motive:'JS 기초는 있고 React 입문 단계예요. 체계적인 커리큘럼이 매력적이라 지원했습니다.'},
      {name:'도윤재',track:'BE',no:'인공지능학과 21',email:'yunjae@sju.ac.kr',discord:'yunjae_do',gh:'github.com/yunjae',stage:'합격',date:'2026.06.06',motive:'CS 기초와 Java 경험이 있고, 리뷰어로도 기여하고 싶습니다.'},
    ];
    document.getElementById('cnt').textContent=apps.length;

    function renderList(sel){
      document.getElementById('list').innerHTML=apps.map((a,i)=>`
        <button onclick="sel(${i})" class="w-full text-left p-4 hover:bg-slate-50 dark:hover:bg-white/5 ${i===sel?'bg-brand/5 border-l-2 border-brand':''}">
          <div class="flex justify-between items-center"><span class="font-semibold">${a.name}</span><span class="text-xs px-2 py-0.5 rounded-full ${stageCls[a.stage]}">${a.stage}</span></div>
          <div class="text-sm text-slate-500 mt-0.5">${a.track} · ${a.no}</div>
        </button>`).join('');
    }
    function select(i){
      [...document.querySelectorAll('#list button')].forEach((b,j)=>b.className=`w-full text-left p-4 hover:bg-slate-50 dark:hover:bg-white/5 ${j===i?'bg-brand/5 border-l-2 border-brand':''}`);
      const a=apps[i];
      document.getElementById('detail').innerHTML=`
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <div class="flex items-center gap-2"><h2 class="text-xl font-bold">${a.name}</h2><span class="text-xs px-2 py-0.5 rounded-full ${stageCls[a.stage]}">${a.stage}</span></div>
            <div class="text-sm text-slate-500 mt-0.5">${a.track} · ${a.no} · 제출 ${a.date}</div>
          </div>
          <div class="flex gap-2 text-sm">
            <a href="mailto:${a.email}" class="px-3 py-2 rounded-lg bg-brand text-white font-semibold" title="이메일로 개별 연락">이메일로 연락</a>
            <select class="rounded-lg px-2 py-2 bg-white dark:bg-slate-800 ring-1 ring-slate-900/10 dark:ring-white/10" title="단계 변경(내부)">
              ${['서류','면접','합격','불합격'].map(s=>`<option ${s===a.stage?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="mt-5 grid sm:grid-cols-2 gap-x-6 gap-y-3 text-sm">
          ${row('이메일',a.email)} ${row('디스코드',a.discord)} ${row('GitHub',a.gh||'—')} ${row('트랙',a.track)}
        </div>
        <div class="mt-5">
          <div class="text-sm font-semibold text-slate-500 mb-1">지원 동기</div>
          <p class="text-slate-700 dark:text-slate-300 leading-relaxed rounded-xl bg-slate-50 dark:bg-slate-900 p-4">${a.motive}</p>
        </div>
        <div class="mt-5 flex gap-2 text-sm">
          <button class="px-3 py-2 rounded-lg bg-emerald-600 text-white font-semibold" title="합격 처리 → 멤버로 전환">합격 · 멤버 전환</button>
          <button class="px-3 py-2 rounded-lg ring-1 ring-slate-900/10 dark:ring-white/15 font-semibold">불합격</button>
        </div>`;
    }
    function row(k,v){ return `<div><div class="text-slate-400">${k}</div><div class="font-medium break-all">${v}</div></div>`; }
    window.select=select;
    document.getElementById('list').innerHTML=apps.map((a,i)=>`
      <button onclick="select(${i})" class="w-full text-left p-4 hover:bg-slate-50 dark:hover:bg-white/5 ${i===0?'bg-brand/5 border-l-2 border-brand':''}">
        <div class="flex justify-between items-center"><span class="font-semibold">${a.name}</span><span class="text-xs px-2 py-0.5 rounded-full ${stageCls[a.stage]}">${a.stage}</span></div>
        <div class="text-sm text-slate-500 mt-0.5">${a.track} · ${a.no}</div>
      </button>`).join('');
    select(0);
  </script>
</body>
</html>
