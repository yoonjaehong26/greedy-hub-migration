<!doctype html>
<html lang="ko" class="scroll-smooth">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>운영진 대시보드 — 그리디 허브</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/site.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 font-sans antialiased">
  <div id="nav"></div>

  <main class="mx-auto max-w-6xl px-5 py-10">
    <div class="flex flex-wrap items-center gap-3">
      <h1 class="text-2xl md:text-3xl font-bold">운영진 대시보드</h1>
      <span id="rolebadge"></span>
    </div>
    <p class="mt-1 text-slate-600 dark:text-slate-400">4기 · FE 트랙 기준. 메인테이너·리드가 미션·리뷰·멤버를 한눈에 관리합니다.</p>

    <!-- 요약 -->
    <div class="mt-7 grid grid-cols-2 sm:grid-cols-4 gap-4">
      <div class="rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-5" title="쉬는 주 제외, 전체 멤버 평균 완주율"><div class="text-sm text-slate-500">기수 완주율</div><div class="mt-1 text-3xl font-bold">88%</div></div>
      <div class="rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-5" title="리뷰어 배정 후 진행 중인 제출"><div class="text-sm text-slate-500">리뷰 진행</div><div class="mt-1 text-3xl font-bold text-brand">3</div></div>
      <div class="rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-5" title="리뷰 마감이 임박한 제출"><div class="text-sm text-slate-500">마감 임박</div><div class="mt-1 text-3xl font-bold text-amber-500">1</div></div>
      <div class="rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10 p-5" title="아직 제출하지 않은 멤버 수 (이번 주)"><div class="text-sm text-slate-500">미제출</div><div class="mt-1 text-3xl font-bold">1</div></div>
    </div>

    <!-- 빠른 작업 -->
    <div class="mt-6 flex flex-wrap gap-2 text-sm">
      <a href="mission-create.html" class="px-3.5 py-2 rounded-lg bg-brand text-white font-semibold" title="새 미션을 출제하고 리뷰 가이드라인을 작성합니다">+ 미션 출제</a>
      <a href="admin-members.html" class="px-3.5 py-2 rounded-lg ring-1 ring-slate-900/10 dark:ring-white/10 font-semibold" title="멤버 역할·세부권한·트랙 관리">멤버·권한 관리</a>
      <a href="review.html" class="px-3.5 py-2 rounded-lg ring-1 ring-slate-900/10 dark:ring-white/10 font-semibold" title="리뷰어 배정 현황과 워크스페이스">리뷰 배정 현황</a>
      <a href="admin-recruit.html" class="px-3.5 py-2 rounded-lg ring-1 ring-slate-900/10 dark:ring-white/10 font-semibold" title="들어온 지원서 확인·심사·개별 연락">지원자 관리</a>
    </div>

    <!-- 매트릭스 -->
    <div class="mt-9 flex items-center justify-between">
      <h2 class="text-lg font-semibold">멤버 × 미션 매트릭스</h2>
      <div class="flex items-center gap-3">
        <div class="inline-flex rounded-lg ring-1 ring-slate-900/10 dark:ring-white/10 overflow-hidden text-sm">
          <button class="px-3 py-1.5 bg-brand text-white">FE</button><button class="px-3 py-1.5 bg-white dark:bg-slate-800">BE</button>
        </div>
        <div class="hidden sm:flex gap-3 text-xs text-slate-500">
          <span class="inline-flex items-center gap-1"><i class="w-3 h-3 rounded-sm bg-emerald-500 inline-block"></i>완료</span>
          <span class="inline-flex items-center gap-1"><i class="w-3 h-3 rounded-sm bg-brand inline-block"></i>리뷰중</span>
          <span class="inline-flex items-center gap-1"><i class="w-3 h-3 rounded-sm bg-slate-300 dark:bg-white/20 inline-block"></i>미제출</span>
        </div>
      </div>
    </div>
    <div class="mt-3 overflow-x-auto rounded-2xl bg-white dark:bg-slate-800/70 shadow-sm ring-1 ring-slate-900/5 dark:ring-white/10">
      <table class="w-full text-sm">
        <thead class="text-slate-500"><tr class="border-b border-slate-100 dark:border-white/10">
          <th class="text-left font-medium p-3 sticky left-0 bg-white dark:bg-slate-800">멤버</th>
          <th class="p-3 font-medium">1주</th><th class="p-3 font-medium">2주</th><th class="p-3 font-medium">3주</th><th class="p-3 font-medium">4주</th><th class="p-3 font-medium">5주</th><th class="p-3 font-medium">6주</th><th class="p-3 font-medium">완주율</th>
        </tr></thead>
        <tbody id="matrix"></tbody>
      </table>
    </div>
    <p class="mt-3 text-xs text-slate-400">행(멤버) 클릭 → 멤버 프로필 · 셀 클릭 → 해당 제출 상세. 제출이 늦거나 미흡하면 리뷰가 진행되지 않을 수 있습니다.</p>
  </main>

  <div id="footer"></div>
  <script>
    renderChrome('admin.html');
    document.getElementById('rolebadge').innerHTML = roleBadge('운영진');
    const cell = s => {
      const m = { done:'bg-emerald-500', review:'bg-brand', none:'bg-slate-300 dark:bg-white/20' };
      const label = { done:'완료', review:'리뷰중', none:'미제출' };
      return `<td class="p-3 text-center"><a href="mission-detail.html" title="${label[s]} — 제출 상세 보기" class="inline-block w-6 h-6 rounded-md ${m[s]} hover:ring-2 hover:ring-offset-1 hover:ring-brand"></a></td>`;
    };
    const rate = a => Math.round(a.filter(x=>x==='done').length / a.length*100)+'%';
    // FE 4기 멤버 4명 (PRD 인원수와 일치)
    const rows = [
      ['김민준', ['done','done','done','review','done','none']],
      ['이서연', ['done','done','done','done','done','done']],
      ['박지호', ['done','done','done','done','done','review']],
      ['최예린', ['done','done','done','done','done','none']],
    ];
    document.getElementById('matrix').innerHTML = rows.map(([n,a])=>`
      <tr class="border-b border-slate-50 dark:border-white/5 hover:bg-slate-50 dark:hover:bg-white/5">
        <td class="p-3 font-medium sticky left-0 bg-white dark:bg-slate-800"><a href="member-profile.html" title="${n} 프로필·이력서 보기" class="hover:text-brand">${n}</a></td>
        ${a.map(cell).join('')}
        <td class="p-3 text-center font-semibold">${rate(a)}</td>
      </tr>`).join('');
  </script>
</body>
</html>
