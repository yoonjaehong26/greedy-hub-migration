<!doctype html>
<html lang="ko" class="scroll-smooth">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>미션 출제 — 그리디 허브</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/site.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 font-sans antialiased">
  <div id="nav"></div>

  <main class="mx-auto max-w-3xl px-5 py-10">
    <div class="flex items-center justify-between gap-3">
      <div class="flex items-center gap-3"><a href="admin.html" class="text-sm text-slate-500 hover:text-brand">← 운영진</a><span id="rolebadge"></span></div>
      <div class="flex gap-2 text-sm">
        <button class="px-3 py-2 rounded-lg ring-1 ring-slate-900/10 dark:ring-white/15 font-semibold" title="임시저장 (DRAFT) — 아직 공개되지 않음">임시저장</button>
        <a href="missions.html" class="px-3 py-2 rounded-lg bg-brand text-white font-semibold" title="출제하면 대상 기수에 공개(OPEN)됩니다">출제하기</a>
      </div>
    </div>
    <h1 class="mt-4 text-2xl font-bold">미션 출제</h1>

    <form class="mt-6 space-y-5" onsubmit="return false">
      <div>
        <label class="block text-sm font-medium mb-1.5">제목</label>
        <input class="w-full rounded-lg px-3 py-2 bg-white dark:bg-slate-800 ring-1 ring-slate-900/10 dark:ring-white/10" placeholder="예: [adv-2.1] 상태관리 심화 — Zustand" />
      </div>
      <div class="grid sm:grid-cols-3 gap-4">
        <div><label class="block text-sm font-medium mb-1.5">트랙</label><select class="w-full rounded-lg px-3 py-2 bg-white dark:bg-slate-800 ring-1 ring-slate-900/10 dark:ring-white/10"><option>FE</option><option>BE</option></select></div>
        <div><label class="block text-sm font-medium mb-1.5">주차/단계</label><input class="w-full rounded-lg px-3 py-2 bg-white dark:bg-slate-800 ring-1 ring-slate-900/10 dark:ring-white/10" placeholder="6주차 / adv-2.1" /></div>
        <div><label class="block text-sm font-medium mb-1.5">기본 리뷰 기간(일)</label><input type="number" value="7" class="w-full rounded-lg px-3 py-2 bg-white dark:bg-slate-800 ring-1 ring-slate-900/10 dark:ring-white/10" title="동아리 공통 기본값 + 미션별 예외" /></div>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1.5">연결 GitHub 레포</label>
        <input class="w-full rounded-lg px-3 py-2 bg-white dark:bg-slate-800 ring-1 ring-slate-900/10 dark:ring-white/10" placeholder="greedy-team/self-paced-react-advanced 또는 cho-log/..." />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1.5">설명</label>
        <textarea rows="3" class="w-full rounded-lg px-3 py-2 bg-white dark:bg-slate-800 ring-1 ring-slate-900/10 dark:ring-white/10" placeholder="미션 개요"></textarea>
      </div>

      <!-- 요구사항 (멤버용) -->
      <div class="rounded-xl bg-white dark:bg-slate-800/70 ring-1 ring-slate-900/5 dark:ring-white/10 p-4">
        <div class="flex items-center justify-between mb-2"><label class="text-sm font-semibold">요구사항 체크리스트 <span class="font-normal text-slate-500">(멤버가 봄)</span></label><button class="text-xs font-semibold text-brand" title="요구사항 항목 추가">+ 항목</button></div>
        <div class="space-y-2 text-sm">
          <div class="flex gap-2 items-center"><span class="text-slate-400">•</span><input class="flex-1 bg-transparent outline-none" value="Context → Zustand 마이그레이션" /></div>
          <div class="flex gap-2 items-center"><span class="text-slate-400">•</span><input class="flex-1 bg-transparent outline-none" value="store를 도메인 단위로 분리" /></div>
          <div class="flex gap-2 items-center"><span class="text-slate-400">•</span><input class="flex-1 bg-transparent outline-none" placeholder="새 요구사항…" /></div>
        </div>
      </div>

      <!-- 리뷰 가이드라인 (리뷰어용) -->
      <div class="rounded-xl bg-brand/5 ring-1 ring-brand/20 p-4">
        <label class="text-sm font-semibold flex items-center gap-1.5">📌 리뷰 가이드라인 <span class="font-normal text-slate-500">(리뷰어가 봄 · 미션에 영구 저장)</span></label>
        <textarea rows="4" class="mt-2 w-full rounded-lg px-3 py-2 bg-white dark:bg-slate-900 ring-1 ring-slate-900/10 dark:ring-white/10 text-sm" placeholder="이 미션은 이런 포인트로 리뷰해주세요 (마크다운). 다음 기수 리뷰어도 재사용합니다."></textarea>
      </div>
    </form>
  </main>

  <div id="footer"></div>
  <script>renderChrome('admin.html'); document.getElementById('rolebadge').innerHTML = roleBadge('운영진');</script>
</body>
</html>
