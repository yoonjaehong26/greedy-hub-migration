openapi: 3.0.3
info:
  title: 그리디 허브 백엔드 API
  version: "0.1.0-draft"
  description: |
    Spring Boot + MySQL로 신규 구현할 백엔드의 계약. 원본 논의·근거는 `docs/backend-api-spec.md` 참고.
    이 파일은 그 문서의 형식적 표현(OpenAPI)이며, 두 문서가 어긋나면 `backend-api-spec.md`가 우선한다.

    **이 스펙에 포함되는 도메인: members · activities · projects** (읽기 GET, 쓰기는 Phase 2).
    **Project·Member 스키마는 팀 백엔드 ERD에 맞춰 정합화됨(2026-07-14, backend-api-spec.md §1.5)** — BE/FE 깃허브·스택 분리, generationNumber(파생), mainStackPosition+memberActivities 등. (projectType은 백엔드 내부 분류라 응답 제외)
    activities는 다음 주 구현이라 이번 정합화에서 제외(현행 유지). 백엔드 신설 요청 2건: MemberActivity.stackPosition(기수별 track)·ProjectImage(screenshots).
    프로젝트는 백엔드 두기로 결정(2026-07-14) — 스키마는 노션 실데이터로 검증 완료.

    **stats(홈 통계)·study(커리큘럼)는 백엔드 없이 프론트에서 처리하기로 확정(2026-07-14)되어 이 스펙에서 제외한다.**
    홈 통계는 멤버·프로젝트 응답에서 파생/정적값으로 산출하고, 커리큘럼은 프론트 상수로 관리한다(근거·데이터 형태는 backend-api-spec.md §5·§7 참고).

    목록 조회는 모두 필터 파라미터 없이 전체 배열을 반환하고, 기수·트랙·카테고리 등 필터링은 전부 프론트(클라이언트 사이드)가 처리한다.

servers:
  - url: /api

tags:
  - name: members
    description: "확정 (Phase 1)"
  - name: activities
    description: "확정 (Phase 1) — 쓰기는 Phase 2"
  - name: projects
    description: "확정 — 백엔드 구현 (읽기 전용, 쓰기는 Phase 2)"

paths:
  /members:
    get:
      tags: [members]
      summary: 전체 멤버 목록 (필터 파라미터 없음 — 프론트에서 클라이언트 사이드 필터링)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/MemberSummary" }

  /members/{id}:
    get:
      tags: [members]
      summary: 멤버 상세 (숫자 PK 또는 GitHub 로그인 슬러그 둘 다 허용)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemberDetail" }
        "404":
          description: 존재하지 않는 멤버
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

    patch:
      tags: [members]
      summary: "⚠️ Phase 1.5 프론트 프로토타입 목업 — 인증 없이 bio·isPublic 갱신 (실제 Spring 계약 아님, backend-api-spec.md §3 Phase 1.5/Phase 2 참고)"
      description: |
        Spring 실서버 전환 시 반드시 로그인한 본인만 호출 가능하도록 인증 미들웨어를 추가해야 한다(Phase 2, 이번 구현 범위 아님).
        bio는 원본 마크다운 그대로 저장하고, 렌더링 시 이스케이프/새니타이징 필수(저장형 XSS 방지).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMemberPayload" }
      responses:
        "200":
          description: 갱신된 멤버 상세 전체
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemberDetail" }
        "404":
          description: 존재하지 않는 멤버
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /activities:
    get:
      tags: [activities]
      summary: 전체 활동 목록. 정렬은 date 내림차순(잠정 확정)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ActivitySummary" }

  /activities/{id}:
    get:
      tags: [activities]
      summary: 활동 상세. images는 sortOrder 오름차순 보장
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActivityDetail" }
        "404":
          description: 존재하지 않는 활동
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /projects:
    get:
      tags: [projects]
      summary: "전체 프로젝트 목록 (필터 파라미터 없음 — 기수 필터는 프론트에서)"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectSummary" }

  /projects/{id}:
    get:
      tags: [projects]
      summary: "프로젝트 상세"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectDetail" }
        "404":
          description: 존재하지 않는 프로젝트
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, example: "NOT_FOUND" }
            message: { type: string }

    # ── 공통 enum·참조 (백엔드 ERD 정합, backend-api-spec.md §1.5) ──
    # generation은 응답에 객체가 아니라 generationNumber(정수)로만 노출(백엔드 Generation 엔티티는 유지, API는 number만 투영).
    # projectType은 백엔드 내부 분류용일 뿐 화면 미사용이라 응답 스키마에서 제외(§1.5 A).
    StackPosition:
      type: string
      enum: [BACKEND, FRONTEND, FULL_STACK]
      description: "Member·ProjectMember 공통. 외부 디자이너 케이스는 제외 결정 — DESIGN 없음."

    BackendStack:
      type: string
      description: "백엔드 스택(우리 실데이터 기준 초안). 값이 늘면 백엔드가 enum vs 자유문자 판단."
      example: "Spring Boot"
      enum: [Java, "Spring Boot", MySQL, PostgreSQL, Redis]

    FrontendStack:
      type: string
      description: "프론트 스택(초안, 확장 가능)."
      example: "React"
      enum: [React, TypeScript, "Next.js", Vite, "Tailwind CSS", Zustand, "TanStack Query", Axios, Leaflet, Storybook, "Kakao Maps API"]

    ActivityType:
      type: string
      enum: [CO_FOUNDER, MAINTAINER, STUDY_LEAD, STUDY_MEMBER, REVIEWER]
      description: "멤버의 기수별 역할(백엔드 MemberActivity.activityType). ⚠️ 동아리장·영입리드는 현재 대응값 없음 — 필요 시 CLUB_LEAD·RECRUITED_LEAD 후속 추가. (사진 있는 활동 타임라인 도메인과 무관)"

    Department:
      type: string
      description: "학과. 실제 학과 목록으로 확정 필요(예시 코드)."
      enum: [COMPUTER_SCIENCE, SOFTWARE, INFO_COMMUNICATION, AI, ETC]

    MemberActivityEntry:
      type: object
      description: "멤버의 기수별 역할 1건(백엔드 MemberActivity). 한 멤버가 여러 기수·역할이면 여러 건."
      properties:
        activityType: { $ref: "#/components/schemas/ActivityType" }
        stackPosition:
          allOf: [{ $ref: "#/components/schemas/StackPosition" }]
          description: "⚠️ 신설 요청 — 기수별 track 보존용(ERD의 MemberActivity엔 없음). 각 기수 역할이 track을 가져 '1기 BE, 2기 FE' 이력 보존."
        generationNumber:
          type: integer
          nullable: true
          description: "기수 번호(Generation.number 조인). 창립(CO_FOUNDER) 등은 null."

    MemberSummary:
      type: object
      description: |
        백엔드 Member 엔티티 정합(§1.5 C). login·avatarUrl은 별도 저장하지 않고 githubUrl에서 파생
        (슬러그=URL 마지막 세그먼트, avatar=github). 기존 memberships[]+joinType은 memberActivities[]로 대체하고,
        기수별 track은 memberActivities[].stackPosition으로 보존(백엔드 신설 요청).
      properties:
        id: { type: integer }
        name: { type: string }
        githubUrl: { type: string, nullable: true }
        mainStackPosition: { $ref: "#/components/schemas/StackPosition" }
        departments:
          type: array
          items: { $ref: "#/components/schemas/Department" }
        memberActivities:
          type: array
          items: { $ref: "#/components/schemas/MemberActivityEntry" }

    MemberSummaryCounts:
      type: object
      description: "teamProjects는 teamProjects[].length와, completedMissions/blogPosts도 각 배열 길이와 중복될 수 있음 — 제거 논의 중(§11-3)"
      properties:
        completedMissions: { type: integer }
        teamProjects: { type: integer }
        blogPosts: { type: integer }

    MemberProjectRef:
      type: object
      description: "멤버가 참여한 프로젝트 ref(ProjectMember 조인). 역할은 stackPosition enum."
      properties:
        projectId: { type: integer }
        name: { type: string }
        stackPosition: { $ref: "#/components/schemas/StackPosition" }

    MemberActivityRef:
      type: object
      properties:
        activityId: { type: integer }
        date: { type: string, example: "2026.05" }
        tag: { type: string }
        title: { type: string }

    MemberMissionRef:
      type: object
      description: "완료된 미션만 노출(진행중/미완료 제외). 실제 조회 계약은 미결(§11-6)."
      properties:
        missionId: { type: string }
        title: { type: string }
        cohortLabel: { type: string, example: "BE 3기" }
        weekLabel: { type: string, example: "6주차" }

    MemberBlogPostRef:
      type: object
      description: "지금은 MSW 목데이터로만 채워짐. 블로그 도메인 자체가 미확정(§11-7)."
      properties:
        postId: { type: integer }
        title: { type: string }
        category: { type: string }
        relativeDate: { type: string, example: "3일 전" }

    UpdateMemberPayload:
      type: object
      description: "Phase 1.5 프론트 프로토타입 목업 계약 — 둘 다 optional, 보낸 필드만 갱신"
      properties:
        bio: { type: string }
        isPublic: { type: boolean }

    MemberDetail:
      allOf:
        - $ref: "#/components/schemas/MemberSummary"
        - type: object
          properties:
            description: { type: string, nullable: true, description: "소개(기존 bio)" }
            isPublic: { type: boolean, description: "프로필 공개 여부 — 프론트 프로토타입 편집(Phase 1.5), 백엔드는 Phase 2" }
            teamProjects:
              type: array
              items: { $ref: "#/components/schemas/MemberProjectRef" }
              description: "ProjectMember 조인 — 참여 프로젝트"
            activities:
              type: array
              items: { $ref: "#/components/schemas/MemberActivityRef" }
              description: "참여한 활동 타임라인 ref. Activity 도메인은 보류(다음 주) — 참조 형태만 유지."
            summaryCounts:
              allOf: [{ $ref: "#/components/schemas/MemberSummaryCounts" }]
              description: "미션·블로그 집계 — 별도 도메인이라 이 정합화 밖(기존 유지)."
            completedMissions:
              type: array
              items: { $ref: "#/components/schemas/MemberMissionRef" }
              description: "미션=별도 Mongo 백엔드 — 이 계약 밖(기존 유지)."
            blogPosts:
              type: array
              items: { $ref: "#/components/schemas/MemberBlogPostRef" }
              description: "블로그 도메인 미확정 — 기존 유지."

    ActivitySummary:
      type: object
      properties:
        id: { type: integer }
        date: { type: string, example: "2026.05" }
        tag: { type: string, enum: ["행사", "세션", "데모데이", "축제", "창립"] }
        cohort:
          type: integer
          nullable: true
          description: |
            활동이 속한 기수. **date로 파생 불가** — 같은 달에 서로 다른 기수 행사가 공존하고(예: 2025.09에 3기 OT와
            2기 최종 데모데이가 동시 존재), OT·데모데이·MT는 제목/내용이 명시한 기수로 편집 귀속한다. 백엔드가 저장·응답해야 함.
            목록의 기수 탭 필터에 사용.
        title: { type: string }
        summary: { type: string }
        imageCount: { type: integer }
        thumbnailUrls:
          type: array
          maxItems: 3
          items: { type: string }
          description: "images를 sortOrder 오름차순 정렬 후 앞 3장만"

    ActivityImage:
      type: object
      properties:
        id: { type: integer }
        url: { type: string }
        sortOrder: { type: integer }

    ActivityParticipant:
      type: object
      properties:
        memberId: { type: integer, nullable: true }
        name: { type: string }

    ActivityDetail:
      type: object
      properties:
        id: { type: integer }
        date: { type: string }
        tag: { type: string }
        cohort:
          type: integer
          nullable: true
          description: "ActivitySummary.cohort와 동일. 상세의 'N기' 브랜드 배지에 사용."
        title: { type: string }
        location:
          type: string
          nullable: true
          description: "개최 장소. 파생 불가한 순수 콘텐츠(노션 원본에도 없어 별도 입력). 없으면 날짜만 표기. 예: '세종대학교 광개토관'."
        body:
          type: string
          description: "문단 구분은 \\n\\n (마크다운 아님)"
        images:
          type: array
          items: { $ref: "#/components/schemas/ActivityImage" }
        participants:
          type: array
          items: { $ref: "#/components/schemas/ActivityParticipant" }

    ProjectSummary:
      type: object
      description: |
        백엔드 Project 엔티티 정합(§1.5 A). trackLabel·teamSize는 파생값이라 저장 안 함(각각 team의 stackPosition·team 수에서 계산),
        thumbnailColor(썸네일 폴백색)는 프론트 전용이라 계약에서 제외. cohortLabel 'N기'는 generationNumber에서 프론트 파생.
        projectType(FESTIVAL/TASK_FORCE/GENERATION)은 백엔드 내부 분류라 응답 제외(§1.5 A) — 축제·상시 프로젝트 노출 시 추가.
      properties:
        id: { type: integer }
        name: { type: string }
        summary: { type: string, description: "카드 한 줄 요약(기존 description 역할)" }
        thumbnailUrl: { type: string, nullable: true }
        generationNumber: { type: integer, description: "기수 번호(백엔드 Generation.number 조인). cohortLabel 'N기'는 여기서 프론트 파생." }

    ProjectMemberRef:
      type: object
      description: "프로젝트 팀원(백엔드 ProjectMember). memberId=null이면 외부 기여자(ExternalMember)."
      properties:
        memberId: { type: integer, nullable: true }
        name: { type: string }
        stackPosition: { $ref: "#/components/schemas/StackPosition" }
        githubUrl: { type: string, nullable: true, description: "외부 기여자 개인 github(내부 멤버는 memberId로 조회)" }

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/ProjectSummary"
        - type: object
          properties:
            description:
              type: string
              nullable: true
              description: "상세 소개 — 마크다운. Figma '소개 3블록'(문제/기능/제작)은 별도 컬럼 없이 헤딩으로 표현(§1.5 A). 기존 subtitle 흡수."
            siteUrl: { type: string, nullable: true, description: "배포 URL(기존 liveUrl)" }
            backendGithubUrl: { type: string, nullable: true }
            frontendGithubUrl: { type: string, nullable: true }
            backendStack:
              type: array
              items: { $ref: "#/components/schemas/BackendStack" }
            frontendStack:
              type: array
              items: { $ref: "#/components/schemas/FrontendStack" }
            screenshots:
              type: array
              items: { type: string }
              description: "ProjectImage(신설) url들, sortOrder 순('+N 모두 보기' 포함). 현재 placeholder — 실이미지 수급 필요."
            team:
              type: array
              items: { $ref: "#/components/schemas/ProjectMemberRef" }
