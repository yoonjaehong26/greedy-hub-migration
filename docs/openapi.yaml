openapi: 3.0.3
info:
  title: 그리디 허브 백엔드 API
  version: "0.1.0-draft"
  description: |
    Spring Boot + MySQL로 신규 구현할 백엔드의 계약. 원본 논의·근거는 `docs/backend-api-spec.md` 참고.
    이 파일은 그 문서의 형식적 표현(OpenAPI)이며, 두 문서가 어긋나면 `backend-api-spec.md`가 우선한다.

    **백엔드 없이 프론트에서 처리하기로 확정된 도메인 (엔드포인트 미구현):**
    - **stats** — 홈 통계는 백엔드 집계 없이 프론트에서 산출(멤버·프로젝트 데이터에서 파생하거나 정적값). `GET /stats` 미구현.
    - **study(curriculum)** — 커리큘럼은 프론트 상수로 관리. `GET /curriculum` 미구현.
    이 두 도메인의 아래 스키마·경로는 "프론트가 채우는 데이터 형태"의 참고용 기록일 뿐, Spring 구현 대상이 아니다.

    **백엔드 구현이 확정된 도메인: members · activities · projects** (읽기 GET, 쓰기는 Phase 2).
    프로젝트는 백엔드 두기로 결정(2026-07-14) — 스키마는 노션 실데이터로 검증 완료.

    목록 조회는 모두 필터 파라미터 없이 전체 배열을 반환하고, 기수·트랙·카테고리 등 필터링은 전부 프론트(클라이언트 사이드)가 처리한다.

servers:
  - url: /api

tags:
  - name: members
    description: "확정 (Phase 1)"
  - name: activities
    description: "확정 (Phase 1) — 쓰기는 Phase 2"
  - name: stats
    description: "🚫 백엔드 미구현 — 프론트에서 산출(파생/정적)"
  - name: projects
    description: "확정 — 백엔드 구현 (읽기 전용, 쓰기는 Phase 2)"
  - name: study
    description: "🚫 백엔드 미구현 — 프론트 상수로 관리. (참고: week 레벨 데이터 형태, 단계 그룹핑은 프론트 표현 레이어)"

paths:
  /members:
    get:
      tags: [members]
      summary: 전체 멤버 목록 (필터 파라미터 없음 — 프론트에서 클라이언트 사이드 필터링)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/MemberSummary" }

  /members/{id}:
    get:
      tags: [members]
      summary: 멤버 상세 (숫자 PK 또는 GitHub 로그인 슬러그 둘 다 허용)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemberDetail" }
        "404":
          description: 존재하지 않는 멤버
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

    patch:
      tags: [members]
      summary: "⚠️ Phase 1.5 프론트 프로토타입 목업 — 인증 없이 bio·isPublic 갱신 (실제 Spring 계약 아님, backend-api-spec.md §3 Phase 1.5/Phase 2 참고)"
      description: |
        Spring 실서버 전환 시 반드시 로그인한 본인만 호출 가능하도록 인증 미들웨어를 추가해야 한다(Phase 2, 이번 구현 범위 아님).
        bio는 원본 마크다운 그대로 저장하고, 렌더링 시 이스케이프/새니타이징 필수(저장형 XSS 방지).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMemberPayload" }
      responses:
        "200":
          description: 갱신된 멤버 상세 전체
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemberDetail" }
        "404":
          description: 존재하지 않는 멤버
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /activities:
    get:
      tags: [activities]
      summary: 전체 활동 목록. 정렬은 date 내림차순(잠정 확정)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ActivitySummary" }

  /activities/{id}:
    get:
      tags: [activities]
      summary: 활동 상세. images는 sortOrder 오름차순 보장
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActivityDetail" }
        "404":
          description: 존재하지 않는 활동
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /stats:
    get:
      tags: [stats]
      summary: "🚫 백엔드 미구현 — 홈 통계는 프론트에서 산출(멤버·프로젝트 데이터 파생 또는 정적값). 아래 스키마는 프론트가 만드는 형태 참고용."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Stats" }

  /projects:
    get:
      tags: [projects]
      summary: "전체 프로젝트 목록 (필터 파라미터 없음 — 기수 필터는 프론트에서)"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectSummary" }

  /projects/{id}:
    get:
      tags: [projects]
      summary: "프로젝트 상세"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectDetail" }
        "404":
          description: 존재하지 않는 프로젝트
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /curriculum:
    get:
      tags: [study]
      summary: "🚫 백엔드 미구현 — 커리큘럼은 프론트 상수로 관리. 아래는 프론트가 채우는 데이터 형태 참고용."
      description: |
        **결론(2026-07): 스터디 커리큘럼은 백엔드 없이 프론트 상수로 구현한다.** 아래 week 레벨 형태는 프론트 데이터 모델 참고용이다.
        (만약 훗날 백엔드를 만들더라도) 계약은 week 레벨 그대로 유지한다.
        Figma 재설계(주차 → 단계 그룹 + 트랙 소개)에서 프론트가 실제로 소비하는 응답은
        `{ items: CurriculumStage[], trackIntros: CurriculumTrackIntro[] }` 형태지만,
        - stage(단계) = week들을 묶은 그룹 + 그룹에 대한 편집 카피(title/weekRangeLabel/description/missionName/techTags),
        - trackIntro = 트랙별 소개 카피
        는 모두 **표현·편집 레이어**이고, 핵심 기능 데이터(무엇을 배우나 + 상태 + 링크)는 CurriculumWeek 그대로다.
        스터디 도메인 자체가 "백엔드 없이 프론트 상수로 관리" 유력(info 참고)이므로, stage/trackIntro를
        1급 백엔드 스키마로 승격하지 않는다. 실제 백엔드를 만들게 되면 이 엔드포인트는 week 배열만 제공하고
        그룹핑·소개 카피는 프론트 상수(또는 별도 CMS)가 담당한다. 이때 응답 래핑 형태는 그 시점에 재논의.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/CurriculumWeek" }

components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, example: "NOT_FOUND" }
            message: { type: string }

    Membership:
      type: object
      description: "한 사람이 여러 기수에 걸칠 수 있어 배열로 관리(예: 2기 FE 멤버 → 3기 BE 리드)"
      properties:
        cohort: { type: integer, example: 4 }
        track: { type: string, enum: [FE, BE] }
        roles:
          type: array
          items: { type: string, enum: ["멤버", "리뷰어", "리드", "메인테이너", "동아리장", "OB"] }
        team:
          type: string
          nullable: true
          description: "데모데이 팀명(예: '두구두구'). 1~3기만 노션에 기재돼 있어 4기·창립·영입리드는 없음."

    MemberSummary:
      type: object
      description: |
        missionDashboardUrl은 의도적으로 계약에서 제외했다(결정, 2026-07-10) — memberships[]의 가장 최근 항목(cohort 최대)만으로
        `/missions?cohort={cohort}&track={track}`을 100% 파생 가능해 백엔드가 저장·응답할 필요가 없다.
        backend-api-spec.md §3 참고.
      properties:
        id: { type: integer }
        login: { type: string }
        name: { type: string }
        avatarUrl: { type: string, nullable: true }
        memberships:
          type: array
          items: { $ref: "#/components/schemas/Membership" }
        joinType:
          type: string
          nullable: true
          enum: ["창립", "영입리드"]
          description: "정규 기수 '멤버'였던 적이 없는 창립멤버·영입리드만 표기. 그 외엔 없음."

    MemberSummaryCounts:
      type: object
      description: "teamProjects는 teamProjects[].length와, completedMissions/blogPosts도 각 배열 길이와 중복될 수 있음 — 제거 논의 중(§11-3)"
      properties:
        completedMissions: { type: integer }
        teamProjects: { type: integer }
        blogPosts: { type: integer }

    MemberProjectRef:
      type: object
      properties:
        projectId: { type: integer }
        name: { type: string }
        roleLabel: { type: string }

    MemberActivityRef:
      type: object
      properties:
        activityId: { type: integer }
        date: { type: string, example: "2026.05" }
        tag: { type: string }
        title: { type: string }

    MemberMissionRef:
      type: object
      description: "완료된 미션만 노출(진행중/미완료 제외). 실제 조회 계약은 미결(§11-6)."
      properties:
        missionId: { type: string }
        title: { type: string }
        cohortLabel: { type: string, example: "BE 3기" }
        weekLabel: { type: string, example: "6주차" }

    MemberBlogPostRef:
      type: object
      description: "지금은 MSW 목데이터로만 채워짐. 블로그 도메인 자체가 미확정(§11-7)."
      properties:
        postId: { type: integer }
        title: { type: string }
        category: { type: string }
        relativeDate: { type: string, example: "3일 전" }

    UpdateMemberPayload:
      type: object
      description: "Phase 1.5 프론트 프로토타입 목업 계약 — 둘 다 optional, 보낸 필드만 갱신"
      properties:
        bio: { type: string }
        isPublic: { type: boolean }

    MemberDetail:
      allOf:
        - $ref: "#/components/schemas/MemberSummary"
        - type: object
          properties:
            school: { type: string }
            department:
              type: array
              items: { type: string }
              description: "복수 전공 가능. 아직 UI에 노출하지 않음 — 스키마만 선반영."
            admissionYear:
              type: integer
              nullable: true
              description: "학번(입학년도, 2자리). 아직 UI에 노출하지 않음 — 스키마만 선반영."
            bio: { type: string, nullable: true }
            isPublic: { type: boolean }
            summaryCounts: { $ref: "#/components/schemas/MemberSummaryCounts" }
            completedMissions:
              type: array
              items: { $ref: "#/components/schemas/MemberMissionRef" }
            blogPosts:
              type: array
              items: { $ref: "#/components/schemas/MemberBlogPostRef" }
            teamProjects:
              type: array
              items: { $ref: "#/components/schemas/MemberProjectRef" }
            activities:
              type: array
              items: { $ref: "#/components/schemas/MemberActivityRef" }

    ActivitySummary:
      type: object
      properties:
        id: { type: integer }
        date: { type: string, example: "2026.05" }
        tag: { type: string, enum: ["행사", "세션", "데모데이", "축제", "창립"] }
        cohort:
          type: integer
          nullable: true
          description: |
            활동이 속한 기수. **date로 파생 불가** — 같은 달에 서로 다른 기수 행사가 공존하고(예: 2025.09에 3기 OT와
            2기 최종 데모데이가 동시 존재), OT·데모데이·MT는 제목/내용이 명시한 기수로 편집 귀속한다. 백엔드가 저장·응답해야 함.
            목록의 기수 탭 필터에 사용.
        title: { type: string }
        summary: { type: string }
        imageCount: { type: integer }
        thumbnailUrls:
          type: array
          maxItems: 3
          items: { type: string }
          description: "images를 sortOrder 오름차순 정렬 후 앞 3장만"

    ActivityImage:
      type: object
      properties:
        id: { type: integer }
        url: { type: string }
        sortOrder: { type: integer }

    ActivityParticipant:
      type: object
      properties:
        memberId: { type: integer, nullable: true }
        name: { type: string }

    ActivityDetail:
      type: object
      properties:
        id: { type: integer }
        date: { type: string }
        tag: { type: string }
        cohort:
          type: integer
          nullable: true
          description: "ActivitySummary.cohort와 동일. 상세의 'N기' 브랜드 배지에 사용."
        title: { type: string }
        location:
          type: string
          nullable: true
          description: "개최 장소. 파생 불가한 순수 콘텐츠(노션 원본에도 없어 별도 입력). 없으면 날짜만 표기. 예: '세종대학교 광개토관'."
        body:
          type: string
          description: "문단 구분은 \\n\\n (마크다운 아님)"
        images:
          type: array
          items: { $ref: "#/components/schemas/ActivityImage" }
        participants:
          type: array
          items: { $ref: "#/components/schemas/ActivityParticipant" }

    Stats:
      type: object
      properties:
        totalMembers: { type: integer }
        activeCohort: { type: integer }
        tracks: { type: string, example: "FE · BE" }
        teamProjects: { type: integer }

    ProjectSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        cohortLabel: { type: string, example: "1기" }
        trackLabel: { type: string, example: "FE/BE" }
        description: { type: string }
        teamSize: { type: integer }
        thumbnailUrl: { type: string, nullable: true }
        thumbnailColor: { type: string, description: "썸네일 없을 때 카드 배경 그라디언트용 대표색(항상 존재)" }

    ProjectMemberRef:
      type: object
      properties:
        memberId: { type: integer, nullable: true }
        name: { type: string }
        roleLabel: { type: string }

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/ProjectSummary"
        - type: object
          properties:
            subtitle: { type: string, nullable: true }
            githubUrl: { type: string, nullable: true }
            liveUrl: { type: string, nullable: true }
            problem:
              type: string
              nullable: true
              description: "소개 3블록 - '어떤 문제를 풀었나요'. 프로젝트별 편집 텍스트(파생 불가)."
            features:
              type: string
              nullable: true
              description: "소개 3블록 - '주요 기능'. 프로젝트별 편집 텍스트."
            how:
              type: string
              nullable: true
              description: "소개 3블록 - '어떻게 만들었나요'. 프로젝트별 편집 텍스트."
            screenshots:
              type: array
              items: { type: string }
              description: "화면 갤러리 이미지 URL들('+N 모두 보기' 오버플로 포함). 현재 프론트 목업은 placeholder URL — 실제 스크린샷 수급 필요."
            team:
              type: array
              items: { $ref: "#/components/schemas/ProjectMemberRef" }
            stack:
              type: array
              items: { type: string }

    CurriculumWeek:
      type: object
      description: |
        스터디의 핵심 기능 데이터(무엇을 배우나 + 상태 + note·notion·미션 링크). 이 week 레벨 계약은 재설계 전후로 불변이다.
        프론트가 이 week들을 '단계(stage)'로 묶고 트랙 소개 카피를 붙이는 건 표현 레이어라 백엔드 계약에 승격하지 않는다(아래 /curriculum 주석 참고).
      properties:
        id: { type: integer }
        track: { type: string, enum: [FE, BE] }
        weekNo: { type: integer }
        weekLabel: { type: string, example: "1주차" }
        title: { type: string }
        status:
          type: string
          enum: [DONE, ACTIVE, UPCOMING, BREAK]
          description: "DONE 종료 · ACTIVE 진행 중 · UPCOMING 예정(아직 시작 전) · BREAK 쉬는 주. UPCOMING은 재설계로 추가된 실제 주차 상태."
        noteUrl: { type: string, nullable: true }
        notionUrl: { type: string, nullable: true }
        linkedMissionId: { type: integer, nullable: true }
